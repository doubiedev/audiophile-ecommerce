name: audiophile

services:
    mongodb:
        image: mongo:7.0
        container_name: mongodb
        hostname: mongodb
        mem_limit: 1024m
        volumes:
            - ./mongodb/initdb.d/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
            - mongodb-data:/data/db/
            - mongodb-log:/var/log/mongodb/
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
        ports:
            - "27017:27017"
        networks:
            - mongodb_network

volumes:
    mongodb-data:
        driver: local
        name: mongo-data
    mongodb-log:
        driver: local
        name: mongo-log

networks:
    mongodb_network:
        driver: bridge
        name: mongo-network
